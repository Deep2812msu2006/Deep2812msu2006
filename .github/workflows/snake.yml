name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: Deep2812msu2006
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=white&color_dots=#0D1117,#0F3F3C,#0D7A73,#0D9488,#14B8A6
            dist/github-contribution-grid-snake.svg?palette=github&color_snake=teal
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
